<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Siswa</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
            color: #333;
        }

        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        /* Efek Kartu Glassmorphism */
        .kotak {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            transition: transform 0.3s ease;
        }

        .kotak:hover {
            transform: translateY(-5px);
        }

        h2 {
            color: #764ba2;
            border-left: 5px solid #667eea;
            padding-left: 15px;
            margin-top: 0;
            font-size: 1.2rem;
        }

        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 20px;
        }

        .foto {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            object-fit: cover;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .foto:hover {
            border-color: #667eea;
            transform: scale(1.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td {
            padding: 12px 5px;
            border-bottom: 1px solid #eee;
        }

        /* Styling Label Keahlian */
        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .item {
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(118, 75, 162, 0.3);
        }

        /* Styling List Hobi */
        ul {
            list-style: none;
            padding: 0;
        }

        ul li {
            padding: 8px 0;
            display: flex;
            align-items: center;
        }

        ul li::before {
            content: '✓';
            color: #48bb78;
            font-weight: bold;
            margin-right: 10px;
        }

    </style>
</head>
<body>

    <h1>PROFIL SISWA PREMIUM</h1>

    <div class="container">
        <div class="kotak">
            <div class="profile-header">
                <img src="https://files.catbox.moe/zn68gi.png" class="foto" alt="Foto Profil">
                <h2>Data Diri</h2>
            </div>
            <table>
                <tr>
                    <td><b>Nama</b></td>
                    <td>M. Fadilul Kirom</td>
                </tr>
                <tr>
                    <td><b>Sekolah</b></td>
                    <td>SMK PGRI 1 PASURUAN</td>
                </tr>
                <tr>
                    <td><b>Kelas</b></td>
                    <td>X TKJ</td>
                </tr>
            </table>
        </div>

        <div class="kotak">
            <h2>Keahlian</h2>
            <div class="skills-container">
                <span class="item">MikroTik Jaringan</span>
                <span class="item">Web Development</span>
                <span class="item">Hardware Maintenance</span>
                <span class="item">Cyber Security</span>
            </div>
        </div>

        <div class="kotak">
            <h2>Hobi</h2>
            <ul>
                <li>E-Sports & Gaming</li>
                <li>Membaca Literatur Teknologi</li>
                <li>Sepak Bola & Olahraga</li>
            </ul>
        </div>
    </div>

</body>
</html>
